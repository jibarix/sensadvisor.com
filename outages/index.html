<style>
  :root {
    --primary-bg: #ffffff;
    --primary-text: #000000;
    --secondary-text: #333333;
    --border-primary: #000000;
    --accent-light: #f0f0f0;
    --accent-lighter: #f9f9f9;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Code Pro', monospace;
    background: var(--primary-bg);
    color: var(--primary-text);
    line-height: 1.6;
    min-height: 100vh;
  }

  .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

  .header {
    position: sticky; top: 0;
    background: var(--primary-bg);
    border-bottom: 2px solid var(--border-primary);
    margin-bottom: 30px; padding-bottom: 16px;
    z-index: 100;
  }

  .header-content {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 8px;
  }

  .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary-text); text-decoration: none; }
  .logo span { font-weight: 400; color: var(--secondary-text); }

  .header-links {
    display: flex; gap: 14px; align-items: center;
    font-size: 0.85rem; color: var(--secondary-text); flex-wrap: wrap;
  }
  .header-links a {
    font-weight: 600; text-decoration: underline;
    color: var(--primary-text); transition: color 0.2s ease;
  }
  .header-links a:hover { color: var(--secondary-text); }

  .header h1 { font-size: 1.8rem; font-weight: 600; margin-top: 10px; }

  .panel {
    background: var(--primary-bg);
    border: 2px solid var(--border-primary);
    border-radius: 8px; padding: 26px; margin-bottom: 34px;
    transition: all 0.2s ease;
  }
  .panel:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
  }
  .panel h2 {
    font-size: 1.25rem; font-weight: 600; margin-bottom: 14px;
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
  }
  .panel-note { font-size: 0.75rem; font-weight: 400; color: var(--secondary-text); }

  .explain p { font-size: 0.8rem; color: var(--secondary-text); margin-bottom: 12px; }

  .chart-container { position: relative; width: 100%; height: 350px; }

  .nav-anchor { display: block; position: relative; top: -80px; visibility: hidden; }

  .controls {
    display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap;
  }
  .controls button {
    font-family: 'Source Code Pro', monospace;
    font-size: 0.85rem; padding: 6px 12px;
    border: 2px solid var(--border-primary); border-radius: 4px;
    background: var(--primary-bg); color: var(--primary-text); cursor: pointer;
  }
  .controls button:hover { background: var(--primary-text); color: var(--primary-bg); }
  .controls button.active { background: var(--primary-text); color: var(--primary-bg); }

  .toggle-btn {
    font-family: 'Source Code Pro', monospace;
    font-size: 0.7rem; font-weight: 600; padding: 2px 8px;
    border: 2px solid var(--border-primary); background: var(--primary-bg);
    color: var(--primary-text); cursor: pointer; transition: all 0.2s ease;
  }
  .toggle-btn:first-of-type { border-radius: 4px 0 0 4px; }
  .toggle-btn:last-of-type { border-radius: 0 4px 4px 0; border-left: none; }
  .toggle-btn.active { background: var(--primary-text); color: var(--primary-bg); }

  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--accent-light); }
  th {
    font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--secondary-text); border-bottom: 2px solid var(--border-primary);
  }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  tr:hover { background: var(--accent-lighter); }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--primary-text); }
  th.sortable::after { content: " \2195"; opacity: 0.3; }
  th.sortable.asc::after { content: " \2191"; opacity: 1; }
  th.sortable.desc::after { content: " \2193"; opacity: 1; }

  .table-wrap { overflow-x: auto; }

  .no-data { text-align: center; padding: 40px; color: var(--secondary-text); font-style: italic; }

  .source-note {
    font-size: 0.75rem; color: var(--secondary-text); margin-top: 30px;
    padding-top: 16px; border-top: 1px solid var(--accent-light);
  }
  .source-note a { color: var(--primary-text); }

  /* Status hero */
  .status-hero {
    border: 2px solid var(--border-primary); border-radius: 12px;
    padding: 36px 32px; margin-bottom: 34px;
    display: flex; flex-direction: column; align-items: center;
    text-align: center; gap: 8px;
    transition: border-color 0.4s ease, background 0.4s ease;
  }
  .status-dot {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    margin-bottom: 4px;
    animation: pulse 2s ease-in-out infinite;
    box-shadow: 0 0 12px rgba(0,0,0,0.15);
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 12px rgba(0,0,0,0.15); }
    50% { opacity: 0.6; box-shadow: 0 0 24px rgba(0,0,0,0.25); }
  }
  .status-hero .status-label { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
  .status-hero .status-summary { font-size: 0.95rem; color: var(--secondary-text); }
  .status-hero .status-breakdown {
    display: flex; gap: 24px; margin-top: 8px;
    font-size: 0.85rem; color: var(--secondary-text); flex-wrap: wrap;
    justify-content: center;
  }
  .status-hero .status-breakdown .num { font-weight: 700; color: var(--primary-text); }

  /* Uptime calendar */
  .uptime-section { margin-bottom: 20px; }
  .uptime-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
  }
  .uptime-label {
    font-size: 0.8rem; font-weight: 600; width: 100px; flex-shrink: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .uptime-bar {
    display: flex; gap: 2px; flex: 1; min-width: 0;
  }
  .uptime-day {
    flex: 1; height: 28px; border-radius: 3px; cursor: pointer;
    position: relative; min-width: 2px;
    transition: transform 0.1s ease;
  }
  .uptime-day:hover { transform: scaleY(1.4); z-index: 2; }
  .uptime-pct {
    font-size: 0.75rem; color: var(--secondary-text); width: 64px;
    text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums;
  }

  /* Tooltip */
  .uptime-tooltip {
    display: none; position: fixed;
    background: var(--primary-text); color: var(--primary-bg);
    font-size: 0.75rem; padding: 8px 12px; border-radius: 6px;
    pointer-events: none; z-index: 200; max-width: 260px;
    line-height: 1.5; white-space: nowrap;
  }
  .uptime-tooltip.visible { display: block; }

  /* Legend */
  .uptime-legend {
    display: flex; gap: 16px; flex-wrap: wrap;
    margin-top: 14px; font-size: 0.75rem; color: var(--secondary-text);
  }
  .uptime-legend-item { display: flex; align-items: center; gap: 5px; }
  .uptime-legend-swatch {
    width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0;
  }

  @media (max-width: 768px) {
    .status-hero { padding: 24px 18px; }
    .status-hero .status-label { font-size: 1.2rem; }
    .status-hero .status-breakdown { gap: 14px; font-size: 0.8rem; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .chart-container { height: 250px; }
    .uptime-label { width: 70px; font-size: 0.7rem; }
    .uptime-day { height: 20px; }
    .uptime-pct { width: 50px; font-size: 0.7rem; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-content">
      <a class="logo" href="https://sensadvisor.com">SENS ADVISOR</a>
      <div class="header-links">
        <a href="#status">Status</a>
        <a href="#grid-history">Grid History</a>
        <a href="#clients">Clients</a>
        <a href="#regions">Regions</a>
      </div>
    </div>
    <h1>PR Outage Status</h1>
  </div>

  <span class="nav-anchor" id="status"></span>
  <div class="status-hero" id="status-hero">
    <div class="status-dot" id="status-dot"></div>
    <div class="status-label" id="status-label">Loading...</div>
    <div class="status-summary" id="status-summary"></div>
    <div class="status-breakdown" id="status-breakdown"></div>
  </div>

  <span class="nav-anchor" id="grid-history"></span>
  <div class="panel">
    <h2>Grid Status History <span class="panel-note">90 days — based on unplanned outages</span></h2>
    <div class="table-wrap">
      <div id="uptime-calendar"></div>
      <div class="uptime-legend" id="uptime-legend"></div>
    </div>
  </div>

  <div class="uptime-tooltip" id="uptime-tooltip"></div>

  <span class="nav-anchor" id="clients"></span>
  <div class="panel">
    <h2>Clients Without Power
      <span class="panel-note">
        <button class="toggle-btn active" id="toggle-view-total">Total</button><button class="toggle-btn" id="toggle-view-region">Region</button>
        <span style="margin-left:8px"></span>
        <button class="toggle-btn active" id="toggle-unit-clients">Clients</button><button class="toggle-btn" id="toggle-unit-pct">%</button>
      </span>
    </h2>
    <div class="controls">
      <button data-days="1" class="active">24h</button>
      <button data-days="7">7d</button>
      <button data-days="30">30d</button>
      <button data-days="90">90d</button>
      <button data-days="365">1y</button>
    </div>
    <div class="chart-container"><canvas id="chart-main"></canvas></div>
  </div>

  <span class="nav-anchor" id="regions"></span>
  <div class="panel">
    <h2>Region Breakdown <span class="panel-note">Latest snapshot</span></h2>
    <div class="table-wrap">
    <table id="region-table">
      <thead>
        <tr>
          <th class="sortable" data-col="0">Region</th>
          <th class="sortable" data-col="1" style="text-align:right">Clients</th>
          <th class="sortable" data-col="2" style="text-align:right">Without Power</th>
          <th class="sortable" data-col="3" style="text-align:right">Unplanned</th>
          <th class="sortable" data-col="4" style="text-align:right">Planned</th>
          <th class="sortable" data-col="5" style="text-align:right">% Unplanned</th>
          <th class="sortable" data-col="6" style="text-align:right">% Total</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    </div>
  </div>

  <div class="source-note">
    <p><b>Data source:</b> <a href="https://miluma.lumapr.com/">LUMA Energy</a></p>
  </div>
</div>

<script>
  // --- Config ---
  const SUPABASE_URL = "https://grovomkpsqgzakfuvuii.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyb3ZvbWtwc3FnemFrZnV2dWlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NzkxMjgsImV4cCI6MjA5MDE1NTEyOH0.U_ZH5gJij5NLkU786mV58uJ0orHZ6ElMkCtyoyuCvBg";

  const REGION_COLORS = {
    "San Juan": "#e63946",
    "Bayamon": "#f4a261",
    "Carolina": "#e9c46a",
    "Caguas": "#2a9d8f",
    "Arecibo": "#264653",
    "Mayaguez": "#7209b7",
    "Ponce": "#3a86a8",
  };

  const chartFont = { family: "'Source Code Pro', monospace" };
  const chartDefaults = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { labels: { font: { ...chartFont, size: 11 } } },
      tooltip: { titleFont: chartFont, bodyFont: chartFont },
    },
    scales: {
      x: {
        type: "time",
        ticks: { font: { ...chartFont, size: 10 } },
        grid: { color: "#f0f0f0" },
      },
      y: {
        ticks: { font: { ...chartFont, size: 10 } },
        grid: { color: "#f0f0f0" },
      },
    },
  };

  // --- Status thresholds (unplanned % of total clients) ---
  const STATUS_LEVELS = [
    { key: "major",       label: "Major Outage",    minPct: 10, color: "#e04343", weight: 1.0 },
    { key: "partial",     label: "Partial Outage",  minPct: 3,  color: "#e86235", weight: 0.5 },
    { key: "elevated",    label: "Elevated",        minPct: 1,  color: "#faa72a", weight: 0.1 },
    { key: "operational", label: "Operational",      minPct: 0,  color: "#76ad2a", weight: 0   },
  ];
  const NO_DATA_COLOR = "#d5d3cd";

  function classifyUnplannedPct(pct) {
    for (const lvl of STATUS_LEVELS) {
      if (pct >= lvl.minPct) return lvl;
    }
    return STATUS_LEVELS[STATUS_LEVELS.length - 1];
  }

  // Weighted downtime for a day (in minutes) → color
  // Thresholds inspired by Atlassian Statuspage
  function downtimeToColor(weightedMinutes) {
    if (weightedMinutes <= 0) return STATUS_LEVELS[STATUS_LEVELS.length - 1].color; // green
    if (weightedMinutes <= 20) return lerpColor("#76ad2a", "#faa72a", weightedMinutes / 20);
    if (weightedMinutes <= 60) return lerpColor("#faa72a", "#e86235", (weightedMinutes - 20) / 40);
    if (weightedMinutes <= 120) return lerpColor("#e86235", "#e04343", (weightedMinutes - 60) / 60);
    return "#e04343";
  }

  function lerpColor(a, b, t) {
    t = Math.max(0, Math.min(1, t));
    const pa = [parseInt(a.slice(1,3),16), parseInt(a.slice(3,5),16), parseInt(a.slice(5,7),16)];
    const pb = [parseInt(b.slice(1,3),16), parseInt(b.slice(3,5),16), parseInt(b.slice(5,7),16)];
    const r = Math.round(pa[0] + (pb[0]-pa[0]) * t);
    const g = Math.round(pa[1] + (pb[1]-pa[1]) * t);
    const bl = Math.round(pa[2] + (pb[2]-pa[2]) * t);
    return `#${r.toString(16).padStart(2,"0")}${g.toString(16).padStart(2,"0")}${bl.toString(16).padStart(2,"0")}`;
  }

  // Group snapshots by calendar day (local time), compute weighted downtime per day
  // getUnplannedPct: function(snapshot) → unplanned percentage for the entity
  function buildDailyStatus(snapshots, getUnplannedPct) {
    const byDay = {};
    for (const snap of snapshots) {
      const dayKey = new Date(snap.timestamp).toLocaleDateString("en-CA"); // YYYY-MM-DD
      if (!byDay[dayKey]) byDay[dayKey] = [];
      byDay[dayKey].push(snap);
    }

    const result = {};
    for (const [day, snaps] of Object.entries(byDay)) {
      let majorMin = 0, partialMin = 0, elevatedMin = 0;
      let totalSnapMin = 0;

      for (let i = 0; i < snaps.length; i++) {
        // Each snapshot represents the interval until the next snapshot (or ~10 min for last)
        const curr = new Date(snaps[i].timestamp).getTime();
        const next = i + 1 < snaps.length ? new Date(snaps[i+1].timestamp).getTime() : curr + 10 * 60000;
        const minutes = Math.min((next - curr) / 60000, 60); // cap at 60 min per interval
        totalSnapMin += minutes;

        const pct = getUnplannedPct(snaps[i]);
        const lvl = classifyUnplannedPct(pct);
        if (lvl.key === "major") majorMin += minutes;
        else if (lvl.key === "partial") partialMin += minutes;
        else if (lvl.key === "elevated") elevatedMin += minutes;
      }

      const weighted = majorMin + (partialMin * 0.5) + (elevatedMin * 0.1);
      const uptimePct = totalSnapMin > 0 ? Math.max(0, 100 - (weighted / totalSnapMin * 100)) : 100;

      result[day] = {
        color: downtimeToColor(weighted),
        weighted,
        majorMin: Math.round(majorMin),
        partialMin: Math.round(partialMin),
        elevatedMin: Math.round(elevatedMin),
        snapshots: snaps.length,
        uptimePct,
      };
    }
    return result;
  }

  // --- State ---
  let chartMain = null;
  let outageData = null;
  let allData90 = null; // always 90 days for calendar
  let viewMode = "total";
  let unitMode = "clients";

  // --- Supabase fetch helper ---
  async function sbQuery(table, params = "") {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` },
    });
    if (!res.ok) throw new Error(`Supabase ${table}: ${res.status}`);
    return res.json();
  }

  // --- Parse outage snapshot ---
  function parseOutageRow(r) {
    const p = r.payload_json;
    const regions = {};
    if (p.regions) {
      for (const reg of p.regions) {
        regions[reg.name] = {
          without: reg.totalClientsWithoutService || 0,
          total: reg.totalClients || 0,
          pct: reg.percentageClientsWithoutService || 0,
          loadShed: reg.totalClientsAffectedByLoadShed || 0,
          planned: reg.totalClientsAffectedByPlannedOutage || 0,
        };
      }
    }
    const totals = p.totals || {};
    return {
      timestamp: r.observed_at,
      apiTimestamp: p.timestamp || null,
      total: {
        without: totals.totalClientsWithoutService || 0,
        total: totals.totalClients || 0,
        pct: totals.totalPercentageWithoutService || 0,
        loadShed: totals.totalClientsAffectedByLoadShed || 0,
        planned: totals.totalClientsAffectedByPlannedOutage || 0,
      },
      regions,
    };
  }

  // --- Load data ---
  async function loadData(days) {
    const since = new Date(Date.now() - days * 86400000).toISOString();
    const since90 = new Date(Date.now() - 90 * 86400000).toISOString();

    const fetches = [
      sbQuery("outage_snapshots", `select=observed_at,payload_json&observed_at=gte.${since}&order=observed_at.asc`),
    ];
    // Only reload 90-day data if we haven't yet
    if (!allData90) {
      fetches.push(sbQuery("outage_snapshots", `select=observed_at,payload_json&observed_at=gte.${since90}&order=observed_at.asc`));
    }

    const results = await Promise.all(fetches);
    outageData = results[0].map(parseOutageRow);
    if (results[1]) allData90 = results[1].map(parseOutageRow);

    renderAll();
    renderCalendar();
  }

  // --- Render ---
  function renderAll() {
    const data = outageData;
    if (!data || data.length === 0) return;

    const latest = data[data.length - 1];
    const timestamps = data.map(d => new Date(d.timestamp));
    const regionNames = Object.keys(REGION_COLORS);
    const isPct = unitMode === "pct";

    // Main chart
    if (chartMain) chartMain.destroy();
    let datasets;
    if (viewMode === "total") {
      const ptRadius = data.length > 100 ? 0 : 3;
      datasets = [
        {
          label: isPct ? "% Unplanned" : "Unplanned",
          data: data.map(d => {
            if (isPct) {
              const unplanned = Math.max(0, d.total.without - d.total.planned);
              return d.total.total > 0 ? (unplanned / d.total.total * 100) : 0;
            }
            return Math.max(0, d.total.without - d.total.planned);
          }),
          borderColor: "#e63946",
          backgroundColor: "rgba(230,57,70,0.25)",
          fill: true, tension: 0.3, pointRadius: ptRadius,
          order: 1,
        },
        {
          label: isPct ? "% Planned" : "Planned",
          data: data.map(d => {
            if (isPct) {
              return d.total.total > 0 ? (d.total.planned / d.total.total * 100) : 0;
            }
            return d.total.planned;
          }),
          borderColor: "#6c757d",
          backgroundColor: "rgba(108,117,125,0.25)",
          fill: true, tension: 0.3, pointRadius: ptRadius,
          order: 2,
        },
      ];
    } else {
      datasets = regionNames.map(name => ({
        label: name,
        data: data.map(d => isPct ? (d.regions[name]?.pct || 0) : (d.regions[name]?.without || 0)),
        borderColor: REGION_COLORS[name],
        backgroundColor: REGION_COLORS[name] + "22",
        fill: !isPct, tension: 0.3,
        pointRadius: data.length > 100 ? 0 : 2,
      }));
    }
    chartMain = new Chart(document.getElementById("chart-main"), {
      type: "line",
      data: { labels: timestamps, datasets },
      options: {
        ...chartDefaults,
        scales: {
          ...chartDefaults.scales,
          x: {
            ...chartDefaults.scales.x,
            stacked: viewMode === "total" || (viewMode === "region" && !isPct),
          },
          y: {
            ...chartDefaults.scales.y,
            stacked: viewMode === "total" || (viewMode === "region" && !isPct),
            ticks: { ...chartDefaults.scales.y.ticks, callback: isPct ? (v => v + "%") : undefined },
          },
        },
      },
    });

    renderStatusBanner();

    // Region table — build sortable row data
    tableRows = regionNames.map(name => {
      const r = latest.regions[name] || {};
      const unplanned = Math.max(0, (r.without || 0) - (r.planned || 0));
      const unplannedPct = (r.total || 0) > 0 ? (unplanned / r.total * 100) : 0;
      return {
        name, color: REGION_COLORS[name],
        clients: r.total || 0, without: r.without || 0,
        unplanned, planned: r.planned || 0,
        unplannedPct, totalPct: r.pct || 0,
      };
    });
    tableTotals = {
      clients: latest.total.total, without: latest.total.without,
      unplanned: Math.max(0, latest.total.without - latest.total.planned),
      planned: latest.total.planned,
      unplannedPct: latest.total.total > 0 ? (Math.max(0, latest.total.without - latest.total.planned) / latest.total.total * 100) : 0,
      totalPct: latest.total.pct,
    };
    renderTable();
  }

  let tableRows = [];
  let tableTotals = {};
  let sortCol = -1;
  let sortDir = "asc";
  const COL_KEYS = ["name", "clients", "without", "unplanned", "planned", "unplannedPct", "totalPct"];

  function renderTable() {
    const tbody = document.querySelector("#region-table tbody");
    tbody.innerHTML = tableRows.map(r => `<tr>
        <td><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${r.color};margin-right:6px"></span>${r.name}</td>
        <td class="num">${r.clients.toLocaleString()}</td>
        <td class="num">${r.without.toLocaleString()}</td>
        <td class="num">${r.unplanned.toLocaleString()}</td>
        <td class="num">${r.planned.toLocaleString()}</td>
        <td class="num">${r.unplannedPct.toFixed(2)}%</td>
        <td class="num">${r.totalPct.toFixed(2)}%</td>
      </tr>`).join("") + `<tr style="font-weight:700;border-top:2px solid #000">
        <td>Total</td>
        <td class="num">${tableTotals.clients.toLocaleString()}</td>
        <td class="num">${tableTotals.without.toLocaleString()}</td>
        <td class="num">${tableTotals.unplanned.toLocaleString()}</td>
        <td class="num">${tableTotals.planned.toLocaleString()}</td>
        <td class="num">${tableTotals.unplannedPct.toFixed(2)}%</td>
        <td class="num">${tableTotals.totalPct.toFixed(2)}%</td>
      </tr>`;
  }

  document.querySelectorAll("#region-table th.sortable").forEach(th => {
    th.addEventListener("click", () => {
      const col = parseInt(th.dataset.col);
      if (sortCol === col) {
        sortDir = sortDir === "asc" ? "desc" : "asc";
      } else {
        sortCol = col;
        sortDir = col === 0 ? "asc" : "desc"; // text asc, numbers desc by default
      }
      const key = COL_KEYS[col];
      tableRows.sort((a, b) => {
        const va = a[key], vb = b[key];
        const cmp = typeof va === "string" ? va.localeCompare(vb) : va - vb;
        return sortDir === "asc" ? cmp : -cmp;
      });
      document.querySelectorAll("#region-table th.sortable").forEach(h => h.classList.remove("asc", "desc"));
      th.classList.add(sortDir);
      renderTable();
    });
  });

  // --- Status hero ---
  function renderStatusBanner() {
    const data = outageData;
    if (!data || data.length === 0) return;
    const latest = data[data.length - 1];
    const unplanned = Math.max(0, latest.total.without - latest.total.planned);
    const planned = latest.total.planned;
    const total = latest.total.total;
    const pct = total > 0 ? (unplanned / total * 100) : 0;
    const lvl = classifyUnplannedPct(pct);

    document.getElementById("status-dot").style.background = lvl.color;
    document.getElementById("status-label").textContent =
      lvl.key === "operational" ? "All Regions Operational" : `Grid Status: ${lvl.label}`;
    document.getElementById("status-summary").textContent =
      `${pct.toFixed(2)}% unplanned outage across ${total.toLocaleString()} clients`;
    document.getElementById("status-breakdown").innerHTML =
      `<span><span class="num">${unplanned.toLocaleString()}</span> unplanned</span>` +
      `<span><span class="num">${planned.toLocaleString()}</span> planned</span>` +
      `<span><span class="num">${latest.total.without.toLocaleString()}</span> total without power</span>`;
    document.getElementById("status-hero").style.borderColor = lvl.color;
  }

  // --- 90-day uptime calendar ---
  function renderCalendar() {
    const data = allData90;
    if (!data || data.length === 0) {
      document.getElementById("uptime-calendar").innerHTML = '<div class="no-data">Not enough data for calendar view.</div>';
      return;
    }

    const regionNames = Object.keys(REGION_COLORS);

    // Build 90-day date array
    const days = [];
    const today = new Date();
    today.setHours(23, 59, 59, 999);
    for (let i = 89; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      days.push(d.toLocaleDateString("en-CA"));
    }

    // Overall daily status
    const overallDaily = buildDailyStatus(data, snap => {
      const unplanned = Math.max(0, snap.total.without - snap.total.planned);
      return snap.total.total > 0 ? (unplanned / snap.total.total * 100) : 0;
    });

    // Per-region daily status
    const regionDaily = {};
    for (const name of regionNames) {
      regionDaily[name] = buildDailyStatus(data, snap => {
        const r = snap.regions[name];
        if (!r || r.total === 0) return 0;
        const unplanned = Math.max(0, r.without - r.planned);
        return (unplanned / r.total * 100);
      });
    }

    // Compute uptime % for each row
    function uptimeForRow(daily) {
      let totalDaysWithData = 0, sumPct = 0;
      for (const day of days) {
        if (daily[day]) { totalDaysWithData++; sumPct += daily[day].uptimePct; }
      }
      return totalDaysWithData > 0 ? (sumPct / totalDaysWithData) : null;
    }

    function renderRow(label, daily, labelColor) {
      const uptime = uptimeForRow(daily);
      const uptimeStr = uptime !== null ? uptime.toFixed(2) + "%" : "—";
      const colorDot = labelColor
        ? `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${labelColor};margin-right:4px"></span>`
        : "";
      return `
        <div class="uptime-row">
          <div class="uptime-label">${colorDot}${label}</div>
          <div class="uptime-bar">
            ${days.map(day => {
              const info = daily[day];
              const color = info ? info.color : NO_DATA_COLOR;
              return `<div class="uptime-day" style="background:${color}"
                data-day="${day}" data-label="${label}"
                data-info='${info ? JSON.stringify({s:info.snapshots,m:info.majorMin,p:info.partialMin,e:info.elevatedMin,w:Math.round(info.weighted),u:info.uptimePct.toFixed(2)}) : ""}'
              ></div>`;
            }).join("")}
          </div>
          <div class="uptime-pct">${uptimeStr}</div>
        </div>`;
    }

    let html = renderRow("Overall", overallDaily, null);
    for (const name of regionNames) {
      html += renderRow(name, regionDaily[name], REGION_COLORS[name]);
    }
    document.getElementById("uptime-calendar").innerHTML = html;

    // Legend
    document.getElementById("uptime-legend").innerHTML =
      STATUS_LEVELS.slice().reverse().map(l =>
        `<div class="uptime-legend-item"><div class="uptime-legend-swatch" style="background:${l.color}"></div>${l.label}</div>`
      ).join("") +
      `<div class="uptime-legend-item"><div class="uptime-legend-swatch" style="background:${NO_DATA_COLOR}"></div>No Data</div>`;

    // Tooltip
    const tooltip = document.getElementById("uptime-tooltip");
    document.getElementById("uptime-calendar").addEventListener("mouseover", e => {
      const el = e.target.closest(".uptime-day");
      if (!el) { tooltip.classList.remove("visible"); return; }
      const day = el.dataset.day;
      const label = el.dataset.label;
      const raw = el.dataset.info;
      let text;
      if (!raw) {
        text = `${label} — ${day}<br>No data exists for this day.`;
      } else {
        const info = JSON.parse(raw);
        text = `${label} — ${day}<br>${info.s} snapshots`
          + `<br>Major: ${info.m} min | Partial: ${info.p} min | Elevated: ${info.e} min`
          + `<br>Weighted downtime: ${info.w} min`
          + `<br>Uptime: ${info.u}%`;
      }
      tooltip.innerHTML = text;
      tooltip.classList.add("visible");
      const rect = el.getBoundingClientRect();
      tooltip.style.left = Math.min(rect.left, window.innerWidth - 270) + "px";
      tooltip.style.top = (rect.top - tooltip.offsetHeight - 8) + "px";
    });
    document.getElementById("uptime-calendar").addEventListener("mouseout", e => {
      if (!e.target.closest(".uptime-day")) tooltip.classList.remove("visible");
    });
  }

  // --- Toggle handlers ---
  function setupPair(btn1Id, btn2Id, setter) {
    document.getElementById(btn1Id).addEventListener("click", () => {
      setter(0);
      document.getElementById(btn1Id).classList.add("active");
      document.getElementById(btn2Id).classList.remove("active");
      renderAll();
    });
    document.getElementById(btn2Id).addEventListener("click", () => {
      setter(1);
      document.getElementById(btn2Id).classList.add("active");
      document.getElementById(btn1Id).classList.remove("active");
      renderAll();
    });
  }
  setupPair("toggle-view-total", "toggle-view-region", v => { viewMode = v ? "region" : "total"; });
  setupPair("toggle-unit-clients", "toggle-unit-pct", v => { unitMode = v ? "pct" : "clients"; });

  // Time range buttons
  document.querySelectorAll(".controls button").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".controls button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      loadData(parseInt(btn.dataset.days));
    });
  });

  loadData(1);
</script>
</body>
</html>
